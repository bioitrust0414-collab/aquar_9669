name: Publish to Social Media

on:
  push:
    paths:
      - 'social-posts/pending/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Publish pending posts to Buffer
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_CHANNEL_IDS: ${{ secrets.BUFFER_CHANNEL_IDS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python scripts/publish_to_buffer.py

      - name: Commit published/ moves and debug log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social-posts/
          git diff --cached --quiet || git commit -m "Move published posts to social-posts/published/ [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
